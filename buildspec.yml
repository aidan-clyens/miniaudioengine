version: 0.2

phases:
  install:
    on-failure: ABORT
    commands:
      # The build image already contains all system dependencies.
      # Nothing extra to install at this stage.
      - echo "Build environment ready"

  pre_build:
    on-failure: ABORT
    commands:
      - echo "Configuring CMake (Ubuntu Release)..."
      - cmake --preset ubuntu-release

  build:
    on-failure: ABORT
    commands:
      - echo "Building (Ubuntu Release)..."
      - cmake --build build --parallel $(nproc)

  post_build:
    on-failure: ABORT
    commands:
      - echo "Build completed successfully. Packaging artifacts..."
      - cpack --preset ubuntu-release

reports:
  unit-test-report:
    files:
      - "test-results/unit-tests.xml"
    file-format: JUNITXML

artifacts:
  files:
    - build/src/**/*
    - build/*.rpm
  discard-paths: no
